name: Build EditCode

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pywebview pyinstaller

    - name: Build with PyInstaller (macOS)
      if: runner.os == 'macOS'
      run: pyinstaller --clean EditCode.spec

    - name: Build with PyInstaller (Windows)
      if: runner.os == 'Windows'
      run: pyinstaller --noconfirm --onefile --windowed --icon "icon.ico" --version-file "version_info.txt" "EditCode.py"

    - name: Prepare macOS Artifact
      if: runner.os == 'macOS'
      run: |
        mkdir release_mac
        mv dist/EditCode.app release_mac/

    - name: Upload macOS Artifact
      if: runner.os == 'macOS'
      uses: actions/upload-artifact@v4
      with:
        name: EditCode-macOS
        path: release_mac/

    - name: Upload Windows Artifact
      if: runner.os == 'Windows'
      uses: actions/upload-artifact@v4
      with:
        name: EditCode-Windows
        path: dist/EditCode.exe
